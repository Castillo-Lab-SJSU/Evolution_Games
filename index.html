<!DOCTYPE html>
<html>

<head>
  <title>Mouse Natural Selection Game</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: white;
      color: black;
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    label {
      display: block;
      margin: 6px 0;
    }

    button {
      background: white;
      color: black;
      border: 1px solid black;
      padding: 6px 12px;
      margin: 4px;
      cursor: pointer;
    }

    #timerDisplay {
      font-size: 36px;
      font-weight: bold;
      margin: 12px 0;
    }

    #game {
      width: min(95vw, 900px);
      aspect-ratio: 7 / 4;
      border: 2px solid black;
      position: relative;
      overflow: hidden;
      background: #faf8f2;
    }

    #duneBackground {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .prey {
      width: 34px;
      height: 22px;
      position: absolute;
      cursor: pointer;
      z-index: 5;
    }

    .mouse-svg {
      width: 34px;
      height: 22px;
      pointer-events: none;
    }

    #timeUpOverlay {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.65);
      z-index: 10;
      pointer-events: none;
    }

    #nextGenOverlayButton {
      display: none;
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      background: white;
      color: black;
      border: 2px solid black;
      padding: 10px 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    canvas {
      max-width: 700px;
      margin: 20px 0;
    }

    @media (max-width: 900px) {
      body {
        font-size: 16px;
      }

      input[type="range"] {
        width: 100%;
      }

      label {
        margin-bottom: 12px;
      }

      #timerDisplay {
        font-size: 28px;
      }

      #timeUpOverlay {
        font-size: 40px;
      }
    }
  </style>
</head>

<body>
  <h1>Predator-Prey Natural Selection Game</h1>
  <p>Click prey to eat them. Hunting lasts for the selected time.</p>
  <div id="controls">
    <label>
      Student ID:
      <input id="studentIdInput" type="text" placeholder="Enter student ID">
    </label>

    <label>
      Population size:
      <input id="popSizeInput" type="number" value="50" min="5" max="200">
    </label>

    <label>
      Hunt time:
      <input id="huntTimeInput" type="number" value="10" min="3" max="60">
    </label>

    <label>
      Initial A frequency:
      <input id="aFreqInput" type="range" value="0.5" min="0" max="1" step="0.05" oninput="document.getElementById('aFreqValue').textContent = this.value">
      <span id="aFreqValue">0.5</span>
    </label>

    <label>
      Initial B frequency:
      <input id="bFreqInput" type="range" value="0.5" min="0" max="1" step="0.05" oninput="document.getElementById('bFreqValue').textContent = this.value">
      <span id="bFreqValue">0.5</span>
    </label>

    <label>
      Speed multiplier:
      <input id="speedInput" type="range" value="0.5" min="0.1" max="2" step="0.1" oninput="document.getElementById('speedValueDisplay').textContent = this.value">
      <span id="speedValueDisplay">0.5</span>
    </label>

    <label>
      Mutation rate:
      <input id="mutationInput" type="range" value="0" min="0" max="0.000001" step="0.00000001" oninput="document.getElementById('mutationValue').textContent = Number(this.value).toExponential(2)">
      <span id="mutationValue">0.00e+0</span>
    </label>

    <label>
      Habitat:
      <select id="habitatInput">
        <option value="white_dunes">White dunes</option>
        <option value="dark_lava">Dark lava</option>
        <option value="mixed_substrate">Mixed substrate</option>
      </select>
    </label>

    <button onclick="startGame()">Start</button>
    <button onclick="resetGame()">Reset Parameters</button>
    <button id="graphButton" onclick="showGraphs()" style="display:none;">
      Show Graphs
    </button>
  </div>
  <button id="settingsButton" onclick="toggleControls()">
    Settings
  </button>
  <div id="timerDisplay">Time: 10</div>
  <p id="stats"></p>

  <div id="game">
    <div id="timeUpOverlay">TIME'S UP!</div>
  </div>

  <div id="graphs" style="display:none;">
    <h2>Color Locus Graphs</h2>
    <canvas id="colorAlleleChart"></canvas>
    <canvas id="colorGenotypeChart"></canvas>
    <canvas id="colorPhenotypeChart"></canvas>

    <h2>Speed Locus Graphs</h2>
    <canvas id="speedAlleleChart"></canvas>
    <canvas id="speedGenotypeChart"></canvas>
    <canvas id="speedPhenotypeChart"></canvas>

    <h2>Mutation Counts</h2>
    <canvas id="mutationChart"></canvas>
  </div>

  <script>
    const game = document.getElementById("game");
    const stats = document.getElementById("stats");
    const timerDisplay = document.getElementById("timerDisplay");
    let gameWidth;
    let gameHeight;

    function updateGameDimensions() {
      gameWidth = game.clientWidth;
      gameHeight = game.clientHeight;
    }
    const preySize = 34;
    let populationSize = 50;
    let huntTime = 10;
    let initialAFrequency = 0.5;
    let initialBFrequency = 0.5;
    let speedMultiplier = 0.5;
    let mutationRate = 0;
    let habitatType = "white_dunes";
    let prey = [];
    let generation = 1;
    let timeLeft = 10;
    let timer = null;
    let animation = null;
    let huntingActive = false;
    let history = [];
    let charts = [];
    let studentId = "";
    let mutationCounts = {
      A_to_a: 0,
      a_to_A: 0,
      B_to_b: 0,
      b_to_B: 0
    };
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbwDB5wGzu_fsBzuy-3UJIx8L-MMVeFgHKsZyzjjzjeLL92h6HCWNxoGvGMtAJG6tCeRGQ/exec";
    let simulationId = "";

    function toggleControls() {
      const controls = document.getElementById("controls");
      if (controls.style.display === "none") {
        controls.style.display = "block";
      } else {
        controls.style.display = "none";
      }
    }

    function unlockParameters() {
      document.getElementById("popSizeInput").disabled = false;
      document.getElementById("huntTimeInput").disabled = false;
      document.getElementById("aFreqInput").disabled = false;
      document.getElementById("bFreqInput").disabled = false;
      document.getElementById("speedInput").disabled = false;
      document.getElementById("mutationInput").disabled = false;
      document.getElementById("habitatInput").disabled = false;
      document.getElementById("studentIdInput").disabled = false;
    }

    function resetGame() {
      clearInterval(timer);
      cancelAnimationFrame(animation);
      huntingActive = false;
      prey = [];
      history = [];
      charts.forEach(chart => chart.destroy());
      charts = [];
      mutationCounts = {
        A_to_a: 0,
        a_to_A: 0,
        B_to_b: 0,
        b_to_B: 0
      };
      generation = 0;
      timeLeft = Number(document.getElementById("huntTimeInput").value);
      unlockParameters();
      document.getElementById("controls").style.display = "block";
      document.getElementById("graphs").style.display = "none";
      document.getElementById("graphButton").style.display = "none";
      document.getElementById("timerDisplay").textContent = `Time: ${timeLeft}`;
      document.getElementById("stats").innerHTML = "";
      habitatType = document.getElementById("habitatInput").value;
      game.innerHTML = `
    ${habitatBackgroundSVG()}
    <div id="timeUpOverlay">TIME'S UP!</div>
  `;
    }

    function lockParameters() {
      document.getElementById("popSizeInput").disabled = true;
      document.getElementById("huntTimeInput").disabled = true;
      document.getElementById("aFreqInput").disabled = true;
      document.getElementById("bFreqInput").disabled = true;
      document.getElementById("speedInput").disabled = true;
      document.getElementById("mutationInput").disabled = true;
      document.getElementById("habitatInput").disabled = true;
      document.getElementById("studentIdInput").disabled = true;
    }

    function startGame() {
      studentId = document.getElementById("studentIdInput").value.trim();
      if (studentId === "") {
        alert("Please enter your student ID before starting.");
        return;
      }
      populationSize = Number(document.getElementById("popSizeInput").value);
      huntTime = Number(document.getElementById("huntTimeInput").value);
      initialAFrequency = Number(document.getElementById("aFreqInput").value);
      initialBFrequency = Number(document.getElementById("bFreqInput").value);
      speedMultiplier = Number(document.getElementById("speedInput").value);
      mutationRate = Number(document.getElementById("mutationInput").value);
      habitatType = document.getElementById("habitatInput").value;
      lockParameters();
      if (window.innerWidth < 900) {
        document.getElementById("controls").style.display = "none";
      }
      generation = 0;
      simulationId = crypto.randomUUID();
      prey = [];
      history = [];
      clearInterval(timer);
      cancelAnimationFrame(animation);
      document.getElementById("graphs").style.display = "none";
      document.getElementById("graphButton").style.display = "inline";
      charts.forEach(chart => chart.destroy());
      charts = [];
      updateGameDimensions();
      prey = makeStartingPopulation();
      recordHistory();
      submitGenerationData();
      drawPrey();
      startTimer();
      animate();
    }

    function makeStartingPopulation() {
      const population = [];
      const colorAlleles = makeExactAllelePool(
        "A",
        "a",
        initialAFrequency,
        populationSize * 2
      );
      const speedAlleles = makeExactAllelePool(
        "B",
        "b",
        initialBFrequency,
        populationSize * 2
      );
      shuffleArray(colorAlleles);
      shuffleArray(speedAlleles);
      for (let i = 0; i < populationSize; i++) {
        population.push({
          colorGenotype: colorAlleles[i * 2] + colorAlleles[i * 2 + 1],
          speedGenotype: speedAlleles[i * 2] + speedAlleles[i * 2 + 1],
          alive: true,
          x: Math.random() * (gameWidth - preySize),
          y: Math.random() * (gameHeight - preySize),
          dx: Math.random() < 0.5 ? -1 : 1,
          dy: Math.random() < 0.5 ? -1 : 1,
          element: null
        });
      }
      return population;
    }

    function makeExactAllelePool(dominant, recessive, dominantFrequency, totalAlleles) {
      const dominantCount = Math.round(dominantFrequency * totalAlleles);
      const recessiveCount = totalAlleles - dominantCount;
      return [
        ...Array(dominantCount).fill(dominant),
        ...Array(recessiveCount).fill(recessive)
      ];
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = array[i];
        array[i] = array[j];
        array[j] = temp;
      }
    }

    function colorPhenotype(genotype) {
      return genotype.includes("A") ? "dark" : "light";
    }

    function speedPhenotype(genotype) {
      const g = normalizeGenotype(genotype);
      if (g === "BB") return "fast";
      if (g === "Bb") return "medium";
      return "slow";
    }

    function makeMouseSVG(fillColor, outlineColor, tailColor) {
      return `
        <svg class="mouse-svg" viewBox="0 0 80 50">
          <ellipse
            cx="38"
            cy="28"
            rx="24"
            ry="13"
            fill="${fillColor}"
            stroke="${outlineColor}"
            stroke-width="2"
          />

          <circle
            cx="24"
            cy="16"
            r="7"
            fill="${fillColor}"
            stroke="${outlineColor}"
            stroke-width="2"
          />

          <circle cx="16" cy="25" r="2" fill="pink" />
          <circle cx="21" cy="24" r="1.5" fill="black" />

          <path
            d="M60 30 C72 32, 76 38, 80 46"
            fill="none"
            stroke="${tailColor}"
            stroke-width="3"
          />
        </svg>
      `;
    }

    function speedValue(genotype) {
      const g = normalizeGenotype(genotype);
      if (g === "BB") return 0.9 * speedMultiplier;
      if (g === "Bb") return 0.6 * speedMultiplier;
      return 0.3 * speedMultiplier;
    }

    function habitatBackgroundSVG() {
      if (habitatType === "dark_lava") {
        return `
        <svg id="duneBackground" viewBox="0 0 700 400" preserveAspectRatio="none">
          <rect width="700" height="400" fill="#4b3621"/>
          <path d="M -80 80 C 70 25, 210 130, 360 75 S 610 20, 780 95" fill="none" stroke="#7a5230" stroke-width="26" opacity="0.75"/>
          <path d="M -60 145 C 100 90, 220 185, 380 130 S 620 85, 770 150" fill="none" stroke="#3e2818" stroke-width="16" opacity="0.75"/>
          <path d="M -90 220 C 75 155, 230 250, 395 200 S 620 145, 790 215" fill="none" stroke="#8b5e34" stroke-width="22" opacity="0.55"/>
          <path d="M -80 330 C 100 285, 255 375, 430 325 S 625 270, 790 340" fill="none" stroke="#523522" stroke-width="18" opacity="0.85"/>
        </svg>`;
      }
      if (habitatType === "mixed_substrate") {
        return `
    <svg id="duneBackground" viewBox="0 0 700 400" preserveAspectRatio="none">
      <defs>
        <radialGradient id="swirlLight" cx="30%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="55%" stop-color="#f7efe0"/>
          <stop offset="100%" stop-color="#5b3a24"/>
        </radialGradient>

        <radialGradient id="swirlDark" cx="75%" cy="70%" r="70%">
          <stop offset="0%" stop-color="#4b3621"/>
          <stop offset="55%" stop-color="#8b5e34"/>
          <stop offset="100%" stop-color="#ffffff"/>
        </radialGradient>
      </defs>

      <rect width="700" height="400" fill="#d8c7aa"/>

      <path d="M -120 80 C 40 10, 160 140, 300 75 S 520 20, 820 110"
            fill="none" stroke="url(#swirlLight)" stroke-width="95" opacity="0.9"/>

      <path d="M -100 210 C 80 130, 210 300, 370 205 S 570 140, 810 250"
            fill="none" stroke="url(#swirlDark)" stroke-width="105" opacity="0.85"/>

      <path d="M -120 335 C 80 250, 220 420, 390 320 S 610 260, 820 360"
            fill="none" stroke="#f8f2e6" stroke-width="55" opacity="0.8"/>

      <path d="M 20 -60 C 130 80, 60 190, 190 300 S 420 420, 520 250 S 620 90, 760 40"
            fill="none" stroke="#5b3a24" stroke-width="70" opacity="0.55"/>

      <path d="M -60 130 C 120 90, 230 170, 360 130 S 560 80, 760 145"
            fill="none" stroke="#ffffff" stroke-width="10" opacity="0.55"/>

      <path d="M -80 270 C 110 220, 240 320, 390 260 S 590 210, 790 285"
            fill="none" stroke="#7a5230" stroke-width="12" opacity="0.45"/>
    </svg>
  `;
      }
      return `
        <svg id="duneBackground" viewBox="0 0 700 400" preserveAspectRatio="none">
          <defs>
            <linearGradient id="sandGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="50%" stop-color="#fcfaf5"/>
              <stop offset="100%" stop-color="#ffffff"/>
            </linearGradient>
          </defs>
          <rect width="700" height="400" fill="url(#sandGradient)" opacity="1"/>
          <path d="M -80 80 C 70 25, 210 130, 360 75 S 610 20, 780 95" fill="none" stroke="#e8e1d4" stroke-width="22" opacity="0.45"/>
          <path d="M -60 135 C 100 90, 220 185, 380 130 S 620 85, 770 150" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.75"/>
          <path d="M -90 205 C 75 155, 230 250, 395 200 S 620 145, 790 215" fill="none" stroke="#f0e8da" stroke-width="20" opacity="0.38"/>
          <path d="M -70 265 C 110 215, 250 310, 420 260 S 630 205, 785 275" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.7"/>
          <path d="M -80 330 C 100 285, 255 375, 430 325 S 625 270, 790 340" fill="none" stroke="#cfc4ad" stroke-width="18" opacity="0.35"/>
          <path d="M -40 60 C 120 105, 240 40, 390 90 S 620 120, 760 70" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.45"/>
          <path d="M -30 175 C 120 220, 265 160, 420 210 S 620 230, 755 185" fill="none" stroke="#efe6d4" stroke-width="6" opacity="0.65"/>
          <path d="M -30 300 C 130 345, 270 285, 430 335 S 620 360, 755 310" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.5"/>
        </svg>`;
    }

    function drawPrey() {
      game.innerHTML = `
        ${habitatBackgroundSVG()}

        <div id="timeUpOverlay">TIME'S UP!</div>

        <button id="nextGenOverlayButton" onclick="nextGeneration()">
          Next Generation
        </button>
      `;
      document.getElementById("timeUpOverlay").style.display = "none";
      document.getElementById("nextGenOverlayButton").style.display = "none";
      prey.forEach(animal => {
        if (!animal.alive) return;
        const dot = document.createElement("div");
        const isDark = colorPhenotype(animal.colorGenotype) === "dark";
        const fillColor = isDark ? "#5b3a29" : "#f5f5f5";
        const outlineColor = isDark ? "#333333" : "#d8c4a8";
        const tailColor = isDark ? "#777777" : "#e6d7c3";
        dot.className = "prey";
        dot.innerHTML = makeMouseSVG(fillColor, outlineColor, tailColor);
        dot.style.left = animal.x + "px";
        dot.style.top = animal.y + "px";
        if (animal.dx > 0) dot.style.transform = "scaleX(-1)";
        dot.onclick = () => {
          if (!huntingActive) return;
          animal.alive = false;
          dot.remove();
          updateStats();
        };
        animal.element = dot;
        game.appendChild(dot);
      });
      updateStats();
    }

    function animate() {
      cancelAnimationFrame(animation);

      function move() {
        prey.forEach(animal => {
          if (!animal.alive || !animal.element) return;
          const speed = speedValue(animal.speedGenotype);
          animal.dx += (Math.random() - 0.5) * 0.25;
          animal.dy += (Math.random() - 0.5) * 0.25;
          const avoidanceRadius = 25;
          prey.forEach(other => {
            if (other === animal) return;
            if (!other.alive) return;
            const dx = animal.x - other.x;
            const dy = animal.y - other.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance > 0 && distance < avoidanceRadius) {
              const push = (avoidanceRadius - distance) / avoidanceRadius;
              animal.dx += (dx / distance) * push * 0.15;
              animal.dy += (dy / distance) * push * 0.15;
            }
          });
          const length = Math.sqrt(animal.dx * animal.dx + animal.dy * animal.dy);
          animal.dx = animal.dx / length;
          animal.dy = animal.dy / length;
          animal.x += animal.dx * speed;
          animal.y += animal.dy * speed;
          if (animal.x <= 0 || animal.x >= gameWidth - preySize) {
            animal.dx *= -1;
          }
          if (animal.y <= 0 || animal.y >= gameHeight - preySize) {
            animal.dy *= -1;
          }
          animal.element.style.left = animal.x + "px";
          animal.element.style.top = animal.y + "px";
          if (animal.dx > 0) {
            animal.element.style.transform = "scaleX(-1)";
          } else {
            animal.element.style.transform = "scaleX(1)";
          }
        });
        animation = requestAnimationFrame(move);
      }
      move();
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = huntTime;
      huntingActive = true;
      timerDisplay.textContent = `Time: ${timeLeft}`;
      timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `Time: ${timeLeft}`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          huntingActive = false;
          timerDisplay.textContent = "Time's up! Click Next Generation";
          document.getElementById("timeUpOverlay").style.display = "flex";
          document.getElementById("nextGenOverlayButton").style.display = "block";
        }
      }, 1000);
    }

    function nextGeneration() {
      if (prey.length === 0) {
        alert("Click Start / Restart first.");
        return;
      }
      if (huntingActive) {
        alert("Wait until the timer finishes.");
        return;
      }
      const survivors = prey.filter(animal => animal.alive);
      if (survivors.length < 2) {
        alert("Too few survivors to reproduce. Restart the game.");
        return;
      }
      mutationCounts = {
        A_to_a: 0,
        a_to_A: 0,
        B_to_b: 0,
        b_to_B: 0
      };
      const offspring = [];
      while (offspring.length < populationSize) {
        const p1 = randomChoice(survivors);
        const p2 = randomChoice(survivors);
        offspring.push({
          colorGenotype: makeOffspringGenotype(p1.colorGenotype, p2.colorGenotype),
          speedGenotype: makeOffspringGenotype(p1.speedGenotype, p2.speedGenotype),
          alive: true,
          x: Math.random() * (gameWidth - preySize),
          y: Math.random() * (gameHeight - preySize),
          dx: Math.random() < 0.5 ? -1 : 1,
          dy: Math.random() < 0.5 ? -1 : 1,
          element: null
        });
      }
      prey = offspring;
      generation++;
      recordHistory();
      submitGenerationData();
      if (document.getElementById("graphs").style.display === "block") {
        showGraphs();
      }
      drawPrey();
      startTimer();
      animate();
    }

    function mutateAllele(allele) {
      if (Math.random() > mutationRate) return allele;
      if (allele === "A") {
        mutationCounts.A_to_a++;
        return "a";
      }
      if (allele === "a") {
        mutationCounts.a_to_A++;
        return "A";
      }
      if (allele === "B") {
        mutationCounts.B_to_b++;
        return "b";
      }
      if (allele === "b") {
        mutationCounts.b_to_B++;
        return "B";
      }
      return allele;
    }

    function makeOffspringGenotype(g1, g2) {
      let a1 = g1[Math.floor(Math.random() * 2)];
      let a2 = g2[Math.floor(Math.random() * 2)];
      a1 = mutateAllele(a1);
      a2 = mutateAllele(a2);
      return a1 + a2;
    }

    function randomChoice(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function normalizeGenotype(genotype) {
      return genotype.split("").sort().join("");
    }

    function alleleFrequencies(locusName) {
      const counts = {};
      prey.forEach(animal => {
        for (let allele of animal[locusName]) {
          counts[allele] = (counts[allele] || 0) + 1;
        }
      });
      const total = Object.values(counts).reduce((sum, n) => sum + n, 0);
      for (let allele in counts) {
        counts[allele] = counts[allele] / total;
      }
      return counts;
    }

    function genotypeFrequencies(locusName) {
      const counts = {};
      prey.forEach(animal => {
        const g = normalizeGenotype(animal[locusName]);
        counts[g] = (counts[g] || 0) + 1;
      });
      for (let g in counts) {
        counts[g] = counts[g] / prey.length;
      }
      return counts;
    }

    function phenotypeFrequencies(locusName) {
      const counts = {};
      prey.forEach(animal => {
        let phenotype;
        if (locusName === "colorGenotype") {
          phenotype = colorPhenotype(animal.colorGenotype);
        } else {
          phenotype = speedPhenotype(animal.speedGenotype);
        }
        counts[phenotype] = (counts[phenotype] || 0) + 1;
      });
      for (let p in counts) {
        counts[p] = counts[p] / prey.length;
      }
      return counts;
    }

    function countGenotypes(locusName) {
      const counts = {};
      prey.forEach(animal => {
        const genotype = normalizeGenotype(animal[locusName]);
        counts[genotype] = (counts[genotype] || 0) + 1;
      });
      return counts;
    }

    function countSurvivingGenotypes(locusName) {
      const counts = {};
      prey.forEach(animal => {
        if (!animal.alive) return;
        const genotype = normalizeGenotype(animal[locusName]);
        counts[genotype] = (counts[genotype] || 0) + 1;
      });
      return counts;
    }

    function recordHistory() {
      history.push({
        generation,
        colorAlleles: alleleFrequencies("colorGenotype"),
        colorGenotypes: genotypeFrequencies("colorGenotype"),
        colorPhenotypes: phenotypeFrequencies("colorGenotype"),
        speedAlleles: alleleFrequencies("speedGenotype"),
        speedGenotypes: genotypeFrequencies("speedGenotype"),
        speedPhenotypes: phenotypeFrequencies("speedGenotype"),
        mutations: {
          ...mutationCounts
        }
      });
    }

    function updateStats() {
      const alive = prey.filter(x => x.alive).length;
      const eaten = populationSize - alive;
      const colorAlleles = alleleFrequencies("colorGenotype");
      const speedAlleles = alleleFrequencies("speedGenotype");
      const colorGenotypes = genotypeFrequencies("colorGenotype");
      const speedGenotypes = genotypeFrequencies("speedGenotype");
      stats.innerHTML = `
        <strong>Generation ${generation}</strong><br>
        Habitat: ${habitatType.replace("_", " ")}<br>
        Eaten: ${eaten} | Survivors: ${alive}<br><br>

        <strong>Color locus</strong><br>
        A: ${(colorAlleles.A || 0).toFixed(2)} |
        a: ${(colorAlleles.a || 0).toFixed(2)}<br>
        AA: ${(colorGenotypes.AA || 0).toFixed(2)} |
        Aa: ${(colorGenotypes.Aa || 0).toFixed(2)} |
        aa: ${(colorGenotypes.aa || 0).toFixed(2)}<br><br>

        <strong>Speed locus</strong><br>
        B: ${(speedAlleles.B || 0).toFixed(2)} |
        b: ${(speedAlleles.b || 0).toFixed(2)}<br>
        BB: ${(speedGenotypes.BB || 0).toFixed(2)} |
        Bb: ${(speedGenotypes.Bb || 0).toFixed(2)} |
        bb: ${(speedGenotypes.bb || 0).toFixed(2)}
      `;
    }

    function submitGenerationData() {
      const colorAlleles = alleleFrequencies("colorGenotype");
      const speedAlleles = alleleFrequencies("speedGenotype");
      const colorPhenotypes = phenotypeFrequencies("colorGenotype");
      const speedPhenotypes = phenotypeFrequencies("speedGenotype");
      const miceSurvived = prey.filter(x => x.alive).length;
      const miceEaten = populationSize - miceSurvived;
      const colorGenotypeCounts = countGenotypes("colorGenotype");
      const speedGenotypeCounts = countGenotypes("speedGenotype");
      const colorSurvivorCounts = countSurvivingGenotypes("colorGenotype");
      const speedSurvivorCounts = countSurvivingGenotypes("speedGenotype");
      fetch(GOOGLE_SHEET_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentId,
          simulationId,
          generation,
          startPopulationSize: populationSize,
          startAFrequency: initialAFrequency,
          startBFrequency: initialBFrequency,
          huntTime,
          speedMultiplier,
          mutationRate,
          habitatType,
          A: colorAlleles.A || 0,
          a: colorAlleles.a || 0,
          B: speedAlleles.B || 0,
          b: speedAlleles.b || 0,
          dark: colorPhenotypes.dark || 0,
          light: colorPhenotypes.light || 0,
          fast: speedPhenotypes.fast || 0,
          medium: speedPhenotypes.medium || 0,
          slow: speedPhenotypes.slow || 0,
          miceEaten,
          miceSurvived,
          A_to_a: mutationCounts.A_to_a,
          a_to_A: mutationCounts.a_to_A,
          B_to_b: mutationCounts.B_to_b,
          b_to_B: mutationCounts.b_to_B,
          AA_count: colorGenotypeCounts.AA || 0,
          Aa_count: colorGenotypeCounts.Aa || 0,
          aa_count: colorGenotypeCounts.aa || 0,
          AA_survived: colorSurvivorCounts.AA || 0,
          Aa_survived: colorSurvivorCounts.Aa || 0,
          aa_survived: colorSurvivorCounts.aa || 0,
          BB_count: speedGenotypeCounts.BB || 0,
          Bb_count: speedGenotypeCounts.Bb || 0,
          bb_count: speedGenotypeCounts.bb || 0,
          BB_survived: speedSurvivorCounts.BB || 0,
          Bb_survived: speedSurvivorCounts.Bb || 0,
          bb_survived: speedSurvivorCounts.bb || 0,
          timestamp: new Date().toISOString()
        })
      });
    }

    function showGraphs() {
      document.getElementById("graphs").style.display = "block";
      charts.forEach(chart => chart.destroy());
      charts = [];
      const generations = history.map(h => h.generation);
      charts.push(makeChart("colorAlleleChart", "Color Allele Frequencies", generations, [
        ["A", history.map(h => h.colorAlleles.A || 0)],
        ["a", history.map(h => h.colorAlleles.a || 0)]
      ]));
      charts.push(makeChart("colorGenotypeChart", "Color Genotype Frequencies", generations, [
        ["AA", history.map(h => h.colorGenotypes.AA || 0)],
        ["Aa", history.map(h => h.colorGenotypes.Aa || 0)],
        ["aa", history.map(h => h.colorGenotypes.aa || 0)]
      ]));
      charts.push(makeChart("colorPhenotypeChart", "Color Phenotype Frequencies", generations, [
        ["dark", history.map(h => h.colorPhenotypes.dark || 0)],
        ["light", history.map(h => h.colorPhenotypes.light || 0)]
      ]));
      charts.push(makeChart("speedAlleleChart", "Speed Allele Frequencies", generations, [
        ["B", history.map(h => h.speedAlleles.B || 0)],
        ["b", history.map(h => h.speedAlleles.b || 0)]
      ]));
      charts.push(makeChart("speedGenotypeChart", "Speed Genotype Frequencies", generations, [
        ["BB", history.map(h => h.speedGenotypes.BB || 0)],
        ["Bb", history.map(h => h.speedGenotypes.Bb || 0)],
        ["bb", history.map(h => h.speedGenotypes.bb || 0)]
      ]));
      charts.push(makeChart("speedPhenotypeChart", "Speed Phenotype Frequencies", generations, [
        ["fast", history.map(h => h.speedPhenotypes.fast || 0)],
        ["medium", history.map(h => h.speedPhenotypes.medium || 0)],
        ["slow", history.map(h => h.speedPhenotypes.slow || 0)]
      ]));
      charts.push(makeMutationChart("mutationChart", "Mutation Counts Per Generation", generations, [
        ["A → a", history.map(h => h.mutations?.A_to_a || 0)],
        ["a → A", history.map(h => h.mutations?.a_to_A || 0)],
        ["B → b", history.map(h => h.mutations?.B_to_b || 0)],
        ["b → B", history.map(h => h.mutations?.b_to_B || 0)]
      ]));
    }
    window.addEventListener("resize", () => {
      updateGameDimensions();
    });

    function makeChart(canvasId, title, labels, dataSeries) {
      const ctx = document.getElementById(canvasId);
      return new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: dataSeries.map(series => ({
            label: series[0],
            data: series[1],
            fill: false,
            tension: 0.2
          }))
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: title
            }
          },
          scales: {
            y: {
              min: 0,
              max: 1,
              title: {
                display: true,
                text: "Frequency"
              }
            },
            x: {
              title: {
                display: true,
                text: "Generation"
              }
            }
          }
        }
      });
    }

    function makeMutationChart(canvasId, title, labels, dataSeries) {
      const ctx = document.getElementById(canvasId);
      return new Chart(ctx, {
        type: "line",
        data: {
          labels,
          datasets: dataSeries.map(series => ({
            label: series[0],
            data: series[1],
            fill: false,
            tension: 0.2
          }))
        },
        options: {
          responsive: true,
          plugins: {
            title: {
              display: true,
              text: title
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: "Mutation count"
              }
            },
            x: {
              title: {
                display: true,
                text: "Generation"
              }
            }
          }
        }
      });
    }
  </script>
</body>

</html>
